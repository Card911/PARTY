<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,.1);
            text-align: center;
            width: 320px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #eb2525;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #8c1111;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>It's Coming</h1>
    <p>Leave your email and I'll let you know when it's time.</p>

    <form action="https://formspree.io/f/xaqgbvea" method="POST">
        <input
    type="email"
    name="email"
    placeholder="you@example.com"
    required>

        <button>Notify Me</button>
    </form>
</div>

</body>
</html>
